name: Validate Static Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/deploy_cloudflare_pages.py"
      - "scripts/ensure_site.py"
      - "scripts/verify_site.py"
      - "vercel.json"
      - "wrangler.toml"

permissions:
  contents: read

concurrency:
  group: langchainzh-static-validate
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify generated static site
        run: |
          python -m compileall -q scripts
          python scripts/verify_site.py --site-dir site --min-pages 20
